<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Droplet OLED Preview</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #171717;
      --paper: #f7f8f6;
      --panel: #ffffff;
      --line: #d7ddd4;
      --accent: #00d1c1;
      --accent-dark: #007f76;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--paper);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(960px, 100%);
      padding: 28px;
      display: grid;
      grid-template-columns: minmax(280px, 1fr) minmax(260px, 360px);
      gap: 28px;
      align-items: center;
    }

    .stage {
      display: grid;
      place-items: center;
      min-height: 68vh;
    }

    .dock {
      width: min(640px, 94vw);
      aspect-ratio: 1.35;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(180deg, #ffffff 0%, #edf1ed 100%);
      box-shadow: 0 22px 70px rgba(23, 23, 23, 0.14);
    }

    .oled-shell {
      width: min(560px, 86vw);
      padding: 14px;
      border-radius: 8px;
      background: #171717;
      border: 1px solid #303030;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    canvas {
      width: 100%;
      image-rendering: pixelated;
      display: block;
      border-radius: 4px;
      background: #000;
    }

    .copy {
      display: grid;
      gap: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 58px);
      line-height: 0.95;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      font-size: 17px;
      line-height: 1.6;
      color: #42473f;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 4px;
    }

    button {
      appearance: none;
      border: 1px solid var(--accent-dark);
      background: #ffffff;
      color: var(--accent-dark);
      border-radius: 8px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button.active {
      background: var(--accent);
      color: #001f1d;
    }

    .notes {
      display: grid;
      gap: 8px;
      padding-top: 4px;
      font-size: 14px;
      color: #596057;
    }

    @media (max-width: 760px) {
      main {
        grid-template-columns: 1fr;
        padding: 18px;
      }

      .stage {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="stage" aria-label="Animated OLED preview">
      <div class="dock">
        <div class="oled-shell">
          <canvas id="oled" width="128" height="64" aria-label="Droplet pet OLED animation"></canvas>
        </div>
      </div>
    </section>

    <section class="copy">
      <h1>Droplet idle</h1>
      <p>
        A tiny water buddy that gently floats, blinks, and breathes while waiting on the dock.
      </p>
      <div class="controls" aria-label="Pet state controls">
        <button class="active" data-state="idle">Idle</button>
        <button data-state="thirsty">Thirsty</button>
        <button data-state="happy">Happy</button>
      </div>
      <div class="notes">
        <span>Logical OLED size: 128 x 64 px.</span>
        <span>Main animation: slow vertical bob + blink + tiny bubbles.</span>
        <span>Hackathon-friendly: this can be drawn with simple canvas or OLED bitmap frames.</span>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.querySelector("#oled");
    const ctx = canvas.getContext("2d");
    const buttons = [...document.querySelectorAll("button[data-state]")];
    let state = "idle";
    let stateStart = performance.now();

    buttons.forEach((button) => {
      button.addEventListener("click", () => {
        state = button.dataset.state;
        stateStart = performance.now();
        buttons.forEach((item) => item.classList.toggle("active", item === button));
      });
    });

    function px(x, y, w = 1, h = 1, color = "#cafffb") {
      ctx.fillStyle = color;
      ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
    }

    function text(label, x, y, color = "#cafffb") {
      ctx.fillStyle = color;
      ctx.font = "6px monospace";
      ctx.textBaseline = "top";
      ctx.fillText(label, x, y);
    }

    function droplet(cx, cy, t) {
      const bob = Math.sin(t * 0.0022) * 2.2;
      const breathe = Math.sin(t * 0.003) * 0.8;
      const y = cy + bob;
      const wobble = Math.sin(t * 0.0038) * 0.7;
      const blink = Math.sin(t * 0.00135) > 0.965;
      const color = state === "thirsty" ? "#9af7ef" : "#cafffb";

      ctx.save();
      ctx.translate(cx + wobble, y);

      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(0, -26 - breathe);
      ctx.bezierCurveTo(-18, -8, -23, 6, -17, 18);
      ctx.bezierCurveTo(-11, 31, 12, 31, 18, 18);
      ctx.bezierCurveTo(24, 5, 17, -9, 0, -26 - breathe);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "#000";
      ctx.beginPath();
      ctx.moveTo(0, -18);
      ctx.bezierCurveTo(-11, -6, -14, 6, -10, 16);
      ctx.bezierCurveTo(-5, 25, 8, 25, 12, 16);
      ctx.bezierCurveTo(16, 6, 11, -6, 0, -18);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = color;
      if (blink || state === "thirsty") {
        px(-9, -2, 5, 1, color);
        px(5, -2, 5, 1, color);
      } else if (state === "happy") {
        px(-10, -5, 2, 2, color);
        px(-8, -3, 2, 2, color);
        px(8, -5, 2, 2, color);
        px(6, -3, 2, 2, color);
      } else {
        px(-9, -5, 4, 5, color);
        px(6, -5, 4, 5, color);
      }

      if (state === "thirsty") {
        px(-4, 8, 8, 1, color);
        px(-5, 9, 10, 1, color);
      } else {
        px(-5, 8, 2, 2, color);
        px(-3, 10, 2, 2, color);
        px(-1, 11, 5, 1, color);
        px(4, 10, 2, 2, color);
        px(6, 8, 2, 2, color);
      }

      if (state === "happy") {
        px(-17, 4, 3, 2, color);
        px(15, 4, 3, 2, color);
      }

      ctx.restore();
    }

    function drawBubbles(t) {
      for (let i = 0; i < 5; i += 1) {
        const speed = 0.006 + i * 0.001;
        const x = 18 + i * 23 + Math.sin(t * 0.002 + i) * 3;
        const y = 58 - ((t * speed + i * 13) % 70);
        const size = i % 2 === 0 ? 2 : 1;
        px(x, y, size, size, "#78fff4");
      }
    }

    function drawRing(t) {
      const pulse = Math.floor(42 + Math.sin(t * 0.004) * 20);
      const color = state === "thirsty" ? "#78fff4" : "#cafffb";
      ctx.strokeStyle = color;
      ctx.globalAlpha = 0.45 + pulse / 180;
      ctx.strokeRect(2, 2, 124, 60);
      ctx.globalAlpha = 1;
    }

    function render(now) {
      ctx.clearRect(0, 0, 128, 64);
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, 128, 64);

      drawRing(now);
      drawBubbles(now);
      droplet(64, 35, now);

      if (state === "idle") {
        text("SipPet", 6, 6);
      } else if (state === "thirsty") {
        text("LOW H2O", 6, 6);
        text("drink?", 90, 52);
      } else {
        const elapsed = now - stateStart;
        text("+120ml", 6, 6);
        if (elapsed < 1600) text("fresh!", 88, 52);
      }

      requestAnimationFrame(render);
    }

    requestAnimationFrame(render);
  </script>
</body>
</html>
